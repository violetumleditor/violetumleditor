# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

env:
  # Setting environment variables with values of secrets (organisation wide)
  SOURCEFORGE_USERNAME: ${{ secrets.SOURCEFORGE_USERNAME }}
  SOURCEFORGE_PASSWORD: ${{ secrets.SOURCEFORGE_PASSWORD }}


on:
  push:
    branches:
      - master

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
    - name: Checkout source code
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file

    - name: Build and publish to GitHub Packages Apache Maven and Sourceforge.net
      run: mvn -B package deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Prepare latest Swing jar for GitHub Pages
      run: |
        set -euo pipefail
        mkdir -p gh-pages-download
        LATEST_JAR=$(find violetproduct-swing/target -maxdepth 1 -type f -name 'violetumleditor-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | sort -V | tail -n 1)
        if [ -z "$LATEST_JAR" ]; then
          echo "No violetumleditor jar found in violetproduct-swing/target"
          exit 1
        fi
        cp "$LATEST_JAR" gh-pages-download/violetumleditor-latest.jar
        JAR_FILENAME=$(basename "$LATEST_JAR")
        VERSION=${JAR_FILENAME#violetumleditor-}
        VERSION=${VERSION%.jar}
        printf '%s\n' "$VERSION" > gh-pages-download/violetumleditor-latest-version.txt

    - name: Publish latest Swing jar to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        personal_token: ${{ secrets.PAGES_REPO_TOKEN }}
        external_repository: ${{ github.repository_owner }}/violetumleditor.github.io
        publish_branch: master
        publish_dir: gh-pages-download
        keep_files: true


