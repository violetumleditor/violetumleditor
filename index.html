<html>
<head>
  <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* utile en mode kiosque */
    }
  </style>
</head>
<body>
  <!-- Hidden file input for open dialog -->
  <input type="file" id="fileInputDialog" style="display:none;" />
  
  <script type="module">
    // Global state for file operations
    window.cheerpjFileState = {
      selectedFile: null,
      fileLoadedPromise: null,
      pendingImportFilename: null,
      pendingImportData: null,
    };

    const INCOMING_TRANSFER_PREFIX = "violet-import-v1:";
    const MAX_INCOMING_IMPORT_BYTES = 16 * 1024 * 1024;
    const TRUSTED_TRANSFER_ORIGIN = "https://violetumleditor.github.io";

    function base64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    function decodeBase64Utf8(base64) {
      const bytes = base64ToBytes(base64);
      return new TextDecoder().decode(bytes);
    }

    function sanitizeFilename(filename) {
      const proposed = filename && String(filename).trim().length > 0
        ? String(filename).trim()
        : "diagram.violet.html";
      return proposed.replace(/[\\/:*?"<>|]/g, "-");
    }

    function stageIncomingPayload(payload) {
      console.log("[VioletTransfer] stageIncomingPayload called", payload ? { filename: payload.filename, htmlLength: typeof payload.htmlContent === "string" ? payload.htmlContent.length : "N/A" } : "null");
      const content = payload && typeof payload.htmlContent === "string" ? payload.htmlContent : null;
      if (!content) {
        console.warn("[VioletTransfer] Invalid payload — missing htmlContent (full XHTML file is required)");
        return false;
      }

      const filename = sanitizeFilename(payload.filename);
      if (content.length > MAX_INCOMING_IMPORT_BYTES) {
        console.warn(`[VioletTransfer] Rejected: payload too large (${content.length} chars).`);
        window.alert("This diagram is too large to import automatically in the online editor.");
        return false;
      }

      window.cheerpjFileState.pendingImportFilename = filename;
      window.cheerpjFileState.pendingImportData = content;
      console.log(`[VioletTransfer] Staged ${content.length} chars for file "${filename}"`);

      return true;
    }

    /**
     * Stage a UTF-8 string into /str/<filename> so Java can read it via FileInputStream.
     * Per CheerpJ docs: /str/ is exactly for JS→Java file transfers.
     * No cheerpjRunLibrary or Java NIO needed — cheerpOSAddStringFile is a direct VFS API.
     */
    async function stageFileToStr(filename, content, logTag) {
      console.log(`[${logTag}] cheerpOSAddStringFile → /str/${filename} (${content.length} chars) ...`);
      await cheerpOSAddStringFile(`/str/${filename}`, content);
      console.log(`[${logTag}] ✓ /str/${filename} ready for Java`);
    }

    async function writePendingImportToFilesMount() {
      const filename = window.cheerpjFileState.pendingImportFilename;
      const content = window.cheerpjFileState.pendingImportData;
      if (!filename || typeof content !== "string") {
        return null;
      }
      try {
        await stageFileToStr(filename, content, "VioletTransfer");
        return filename;
      } catch (e) {
        console.error(`[VioletTransfer] Unable to stage /str/${filename}:`, e);
        return null;
      }
    }

    window.addEventListener("message", (event) => {
      console.log(`[VioletTransfer] message event from origin "${event.origin}", type:`, event.data && event.data.type);
      // Accept same-origin messages and file:// (origin "null") exports.
      if (event.origin !== TRUSTED_TRANSFER_ORIGIN && event.origin !== "null") {
        console.log(`[VioletTransfer] Ignored message from untrusted origin "${event.origin}"`);
        return;
      }
      const message = event.data;
      if (!message || message.type !== INCOMING_TRANSFER_PREFIX) {
        return;
      }
      console.log("[VioletTransfer] Accepted violet-import-v1 message, staging payload...");
      const accepted = stageIncomingPayload(message.payload);
      if (accepted && event.source && typeof event.source.postMessage === "function") {
        console.log("[VioletTransfer] Sending ACK to sender");
        event.source.postMessage({ type: "violet-import-ack" }, "*");
      }
    });

    function initializeIncomingDiagramTransfer() {
      try {
        if (!window.name || !window.name.startsWith(INCOMING_TRANSFER_PREFIX)) {
          return;
        }
        console.log("[VioletTransfer] Detected window.name transfer (legacy fallback)");
        const encodedPayload = window.name.substring(INCOMING_TRANSFER_PREFIX.length);
        const payloadText = decodeBase64Utf8(encodedPayload);
        const payload = JSON.parse(payloadText);
        stageIncomingPayload(payload);

        // Avoid re-importing if the page is reloaded.
        window.name = "";
      } catch (error) {
        console.warn("[VioletTransfer] Unable to parse window.name transfer", error);
      }
    }

    initializeIncomingDiagramTransfer();

    /**
     * If this page was opened by another window (e.g. from an exported .violet.html),
     * wait up to 2 seconds for the postMessage transfer to arrive before launching Java.
     */
    async function waitForPendingImportIfNeeded() {
      if (window.cheerpjFileState.pendingImportData) {
        console.log("[VioletTransfer] Pending import already staged — launching app immediately");
        return await writePendingImportToFilesMount();
      }
      if (!window.opener) {
        console.log("[VioletTransfer] No opener — launching app immediately");
        return null;
      }
      console.log("[VioletTransfer] Opener detected — waiting up to 2s for incoming diagram transfer...");
      return await new Promise((resolve) => {
        let waited = 0;
        const interval = setInterval(() => {
          waited += 50;
          if (window.cheerpjFileState.pendingImportData) {
            console.log(`[VioletTransfer] Pending import staged after ${waited}ms — launching app`);
            clearInterval(interval);
            writePendingImportToFilesMount().then(resolve);
          } else if (waited >= 2000) {
            console.log("[VioletTransfer] No transfer received after 2s — launching app without import");
            clearInterval(interval);
            resolve(null);
          }
        }, 50);
      });
    }

    // Create hidden file input that will be reused
    const fileInput = document.getElementById('fileInputDialog');
    fileInput.addEventListener('change', (event) => {
      console.log('[VioletOpen] fileInput change event fired, files:', event.target.files.length);
      const file = event.target.files[0];
      window.cheerpjFileState.fileLoadedPromise = null;
      if (file) {
        console.log(`[VioletOpen] Selected file: "${file.name}", size: ${file.size} bytes, type: "${file.type}"`);
        window.cheerpjFileState.fileLoadedPromise = new Promise((resolveLoad) => {
          const reader = new FileReader();
          reader.onload = async (e) => {
            const content = e.target.result;
            console.log(`[VioletOpen] FileReader.onload — read ${content.length} chars from "${file.name}"`);
            try {
              await stageFileToStr(file.name, content, "VioletOpen");
            } catch (err) {
              console.error(`[VioletOpen] ✗ Failed to stage "${file.name}" to /str/`, err);
            }
            window.cheerpjFileState.selectedFile = file;
            console.log(`[VioletOpen] resolveLoad(true) — file staging complete for "${file.name}"`);
            resolveLoad(true);
          };
          reader.onerror = (e) => {
            console.error(`[VioletOpen] FileReader error reading "${file.name}"`, e);
            resolveLoad(false);
          };
          console.log(`[VioletOpen] Starting readAsText for "${file.name}" ...`);
          reader.readAsText(file, 'utf-8');
        });
      } else {
        console.warn('[VioletOpen] change event fired but no file in event.target.files');
      }
      // Reset the input so the same file can be selected again
      fileInput.value = '';
    });

    async function Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeSetApplication(lib, app) {
      window.violetApp = app;
      // Keep callback thread alive as described in CheerpJ interoperability docs.
      return new Promise(() => {});
    }
  
    async function Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeMethodCallback(lib) {
      console.debug("[CheerpJ] nativeMethodCallback reached");
      return 1;
    }
  
    async function Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeDownloadFile(lib, filename, mimeType, content) {
      const bytes = content instanceof Uint8Array ? content : new Uint8Array(content);
      const blob = new Blob([bytes], { type: mimeType || "application/octet-stream" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename || "diagram.violet.html";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    /**
     * Native method: Show file open dialog
     * Returns true if file was selected, false if cancelled
     */
    async function Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeShowOpenDialog(lib, acceptedExtensions) {
      console.log('[VioletOpen] nativeShowOpenDialog called, acceptedExtensions:', acceptedExtensions);
      window.cheerpjFileState.selectedFile = null;
      window.cheerpjFileState.fileLoadedPromise = null;

      fileInput.accept = '.html';

      // Step 1: wait for user to pick a file (or cancel)
      console.log('[VioletOpen] Opening file picker ...');
      const fileWasSelected = await new Promise((resolve) => {
        let done = false;
        const finish = (value) => {
          if (done) return;
          done = true;
          fileInput.removeEventListener('change', handleChange);
          window.removeEventListener('focus', handleFocusBack);
          console.log(`[VioletOpen] File picker closed — fileWasSelected: ${value}`);
          resolve(value);
        };

        // The global change handler sets fileLoadedPromise before this fires
        const handleChange = () => finish(true);

        const handleFocusBack = () => {
          // If user canceled the picker, no change event is fired.
          setTimeout(() => {
            if (!window.cheerpjFileState.fileLoadedPromise) {
              console.log('[VioletOpen] Focus returned without file change — user cancelled');
              finish(false);
            }
          }, 150);
        };

        fileInput.addEventListener('change', handleChange);
        window.addEventListener('focus', handleFocusBack, { once: true });
        fileInput.click();
      });

      if (!fileWasSelected) {
        console.log('[VioletOpen] nativeShowOpenDialog → 0 (cancelled)');
        return 0;
      }

      // Step 2: wait for file to be fully read and staged in /str/
      console.log('[VioletOpen] Waiting for file to be staged in /str/ ...');
      if (window.cheerpjFileState.fileLoadedPromise) {
        await window.cheerpjFileState.fileLoadedPromise;
      }

      const result = window.cheerpjFileState.selectedFile !== null ? 1 : 0;
      console.log(`[VioletOpen] nativeShowOpenDialog → ${result}, selectedFile: "${window.cheerpjFileState.selectedFile?.name}"`);
      return result;
    }

    /**
     * Native method: Get selected file name
     * Returns string filename of the selected file
     */
    async function Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeGetFileName(lib) {
      const name = window.cheerpjFileState.selectedFile ? window.cheerpjFileState.selectedFile.name : '';
      console.log(`[VioletOpen] nativeGetFileName → "${name}"`);
      return name;
    }

    async function Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeHasPendingImport(lib) {
      const result = !!window.cheerpjFileState.pendingImportData;
      console.log("[VioletTransfer] nativeHasPendingImport →", result);
      return result;
    }

    async function Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeGetPendingImportName(lib) {
      const name = window.cheerpjFileState.pendingImportFilename || "";
      console.log("[VioletTransfer] nativeGetPendingImportName →", name);
      return name;
    }

    async function Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeConsumePendingImportData(lib) {
      const content = window.cheerpjFileState.pendingImportData || "";
      const bytes = new TextEncoder().encode(content);
      console.log(`[VioletTransfer] nativeConsumePendingImportData → ${bytes.length} bytes`);
      window.cheerpjFileState.pendingImportData = null;
      return Array.from(bytes);
    }

    /**
     * Native method: Show save dialog
     * Prompts user for filename and triggers download immediately
     */
    async function Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeShowSaveDialog(lib, defaultFilename, content, mimeType) {
      // Browser automatically triggers download, user may be prompted by browser
      // depending on settings for filename and location
      const bytes = content instanceof Uint8Array ? content : new Uint8Array(content);
      const blob = new Blob([bytes], { type: mimeType || "application/octet-stream" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = defaultFilename || "diagram.violet.html";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      return true;
    }

    async function Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeOpenBlobInNewTab(lib, filename, mimeType, content) {
      const bytes = content instanceof Uint8Array ? content : new Uint8Array(content);
      const blob = new Blob([bytes], { type: mimeType || "application/octet-stream" });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank", "noopener,noreferrer");
      setTimeout(() => URL.revokeObjectURL(url), 30000);
      return 1;
    }

    async function Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeOpenPdfPrintTab(lib, content) {
      const bytes = content instanceof Uint8Array ? content : new Uint8Array(content);
      const blob = new Blob([bytes], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);
      const tab = window.open(url, "_blank");
      if (tab) {
        tab.addEventListener("load", () => {
          try {
            tab.focus();
            tab.print();
          } catch (error) {
            // Ignore cross-origin print failures.
          }
        });
      }
      setTimeout(() => URL.revokeObjectURL(url), 30000);
      return 1;
    }
    
    async function Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeOpenUrl(lib, url) {
      try {
        if (!url) return 0;
        const tab = window.open(url, "_blank");
        if (!tab) return 0;
        tab.focus();
        return 1;
      } catch (e) {
        return 0;
      }
    }
    
    await cheerpjInit({
        version: 17,
        clipboardMode: "permission",
        natives: {
            Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeSetApplication,
            Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeMethodCallback,
            Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeDownloadFile,
            Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeShowOpenDialog,
            Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeGetFileName,
            Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeHasPendingImport,
            Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeGetPendingImportName,
            Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeConsumePendingImportData,
            Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeShowSaveDialog,
            Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeOpenUrl,
            Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeOpenBlobInNewTab,
            Java_com_horstmann_violet_application_cheerpj_CheerpJInterfaceService_nativeOpenPdfPrintTab,
        }
    });
    const incomingFilename = await waitForPendingImportIfNeeded();
    cheerpjCreateDisplay(-1, -1, document.body);
    const runArgs = ["-kioskMode", "-autoSave", "-cheerpjMode"];
    if (incomingFilename && String(incomingFilename).trim().length > 0) {
      runArgs.push("-file=/str/" + String(incomingFilename).trim());
    }
    await cheerpjRunJar("/app/product/violetumleditor-latest.jar", ...runArgs);
  </script>
</body>  
</html>
